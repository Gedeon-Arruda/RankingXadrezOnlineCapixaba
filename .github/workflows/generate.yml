name: Generate Capixaba ranking data and publish

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'    # diário às 06:00 UTC (ajuste se quiser)
  workflow_dispatch:      # permite executar manualmente pelo Actions UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run generator script
        run: npm run generate

      - name: Commit generated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/players.json docs/players_chesscom.json
          git commit -m "Update Capixaba ranking data files" || echo "no changes to commit"
          git push
